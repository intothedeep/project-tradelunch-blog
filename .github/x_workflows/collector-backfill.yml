name: collector-13f-backfill

# ONE-SHOT historical SEC 13F backfill (Phase L L5). Manual only (workflow_dispatch).
# Populates the last ~2 years (8 quarters) of holdings per fund into
# sec_filings/sec_holdings via run_backfill. Idempotent (UPSERT + period-scoped
# supersede), so safe to re-run. The recurring `collector-13f` weekly workflow
# keeps the latest quarter current going forward — this is only the initial fill.
# Defaults to LIVE (writes DB + Parquet archive); set dry_run=true to preview only.
# SEC requires a descriptive User-Agent (SEC_USER_AGENT) or it 403s.
#
# L17: db_keep_quarters decouples the Parquet archive window (since) from the
# Postgres serving window. A `since=2013` run writes full history to Parquet but
# only the recent keep window to DB. Default=12 (3 years).
on:
  workflow_dispatch:
    inputs:
      cik:
        description: "Single fund CIK (digits; zero-pad optional) — empty = all funds in funds.yaml."
        required: false
        default: ""
      since:
        description: "Earliest period_of_report (YYYY or YYYY-MM-DD). Empty = ~2 years back."
        required: false
        default: ""
      dry_run:
        description: "Preview only, no writes. Default false = actually backfill + archive."
        type: boolean
        required: false
        default: false
      archive:
        description: "Also write the Parquet cold archive to Storage (default off)."
        type: boolean
        required: false
        default: false
      db_keep_quarters:
        description: "DB write window in quarters (default 12 = 3 years). Periods older than this skip DB writes but still go to Parquet when archive=true."
        required: false
        default: "12"

concurrency:
  group: collector-13f-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # uv via setup-uv, pinned to an immutable commit SHA (supply-chain hardening)
      # with warm dependency cache keyed off apps/stock_collector/uv.lock.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector
      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      - name: Run 13F historical backfill
        env:
          # Session pooler (5432). Either name works; value = Supavisor session pooler.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          # SEC fair-access: REQUIRED descriptive UA ("Name email"); missing -> 403.
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          # Parquet cold archive (best-effort, default OFF). Only writes when the
          # `archive` input is checked AND both Supabase vars are present.
          SHOULD_COLLECTOR_ARCHIVE_SEC_PARQUET: ${{ inputs.archive && '1' || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          COLLECTOR_SEC_PARQUET_BUCKET: ${{ vars.COLLECTOR_SEC_PARQUET_BUCKET }}
        run: |
          uv run python -u -m collector.entrypoints.run_backfill \
            ${{ inputs.cik != '' && format('--cik {0}', inputs.cik) || '' }} \
            ${{ inputs.since != '' && format('--since {0}', inputs.since) || '' }} \
            ${{ inputs.dry_run && '--dry-run' || '' }} \
            ${{ inputs.archive && '--archive' || '' }} \
            --db-keep-quarters ${{ inputs.db_keep_quarters }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-13f-backfill failed (run ${{ github.run_id }})","body":"The SEC 13F historical backfill failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'
