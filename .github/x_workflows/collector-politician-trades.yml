name: collector-politician-trades

# DAILY kadoa congressional-trade disclosure collector (Phase Q).
# Schedule: 09:30 UTC — offset from existing crons (daily 06:00, weekly 07:00,
# security-map 08:00) to avoid DB contention.
# No API key required; kadoa trades.json is public on GitHub raw content.
on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch+parse+print counts only, no DB writes."
        type: boolean
        required: false
        default: true

concurrency:
  group: collector-politician-trades
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # uv via setup-uv, pinned to an immutable commit SHA (supply-chain hardening)
      # with warm dependency cache keyed off apps/stock_collector/uv.lock.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector
      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      - name: Ingest kadoa politician trades
        env:
          # Session pooler (5432). Either name works; value = Supavisor session pooler.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: |
          uv run python -u -m collector.entrypoints.run_politician_trades \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-politician-trades failed (run ${{ github.run_id }})","body":"The kadoa politician trades collector failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'
