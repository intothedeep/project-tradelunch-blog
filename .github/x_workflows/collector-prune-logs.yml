name: collector-prune-logs

# DAILY log-retention TTL prune (Phase N).
# 03:00 UTC — the cadence the retired error_log_cleanup pg_cron intended.
#
# SCOPE: error_log + batch_log ONLY. Both carry an owner-approved no-tombstone
# exception (migrations 0014 / 0015) — operational logs with no deleted_at,
# pruned purely by age. There is NO Parquet archive precondition (unlike OHLC /
# 13F). Low blast radius, fully self-observing (each run writes a batch_log row).
#
# MODE: LIVE on schedule. Unlike the archive-gated prunes, a daily dry-run that
# never deletes is useless here. A manual workflow_dispatch still defaults to
# dry-run for a preview; uncheck dry_run for a manual live run.
#
# Retention: error_log 7 days, batch_log 90 days (resolved=0 open failures kept).
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (count only, no deletes)."
        type: boolean
        default: true

concurrency:
  group: collector-prune-logs
  cancel-in-progress: true

jobs:
  prune-logs:
    name: Prune error_log + batch_log (TTL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # uv via setup-uv, pinned to an immutable commit SHA (supply-chain hardening)
      # with warm dependency cache keyed off apps/stock_collector/uv.lock.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector
      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      # LIVE on schedule. A manual dispatch defaults to dry-run (count preview);
      # uncheck dry_run for a manual live prune. Sanctioned no-tombstone TTL.
      - name: Run log retention TTL prune
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            uv run python -m collector.entrypoints.prune_logs --dry-run
          else
            echo "::warning::LIVE log prune — deletes aged error_log (7d) + batch_log (90d) rows"
            uv run python -m collector.entrypoints.prune_logs
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-prune-logs failed (run ${{ github.run_id }})","body":"The daily log retention TTL prune failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'
