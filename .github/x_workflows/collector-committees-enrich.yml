name: collector-committees-enrich

# Phase Q: seed politician_committees + committee_sector_map from the
# unitedstates/congress-legislators dataset (CC0 — committees-current.yaml +
# committee-membership-current.yaml).
# Congress membership changes slowly — run manually when:
#   (a) new Congress session starts and committee assignments change, or
#   (b) first-time seed after applying migration 0025.
# workflow_dispatch ONLY — no schedule.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch + parse + print guardrail stats only; no DB writes."
        type: boolean
        required: false
        default: true

concurrency:
  group: collector-committees-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector

      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      - name: Enrich committee membership
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: |
          uv run python -u -m collector.entrypoints.enrich_committees \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-committees-enrich failed (run ${{ github.run_id }})","body":"The committee enrichment job failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'
