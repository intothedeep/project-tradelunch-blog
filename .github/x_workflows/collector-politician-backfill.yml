name: collector-politician-backfill

# ONE-SHOT backfill of per-filer full trade history from kadoa (Phase Q).
# workflow_dispatch ONLY — no schedule. Run manually after initial deploy or
# after a filer-detail gap is detected. Default dry_run=true for safety.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch+parse+print counts only, no DB writes."
        type: boolean
        required: false
        default: true
      limit:
        description: "Process only the first N filers (0 = all)."
        type: number
        required: false
        default: 0

concurrency:
  group: collector-politician-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector

      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      - name: Backfill kadoa politician trades
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: |
          uv run python -u -m collector.entrypoints.backfill_politician_trades \
            ${{ inputs.dry_run && '--dry-run' || '' }} \
            ${{ inputs.limit > 0 && format('--limit {0}', inputs.limit) || '' }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-politician-backfill failed (run ${{ github.run_id }})","body":"The kadoa politician trades backfill failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'
