name: collector-weekly

# WEEKLY market-cap ranking + sticky-universe update (Phase I — Phase 2).
# Sundays 06:00 UTC. No MASSIVE_API_KEY — candidate pool is Wikipedia/IWB-class
# public sources (GitHub S&P500 CSV). Only DATABASE_URL is needed.
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch: {}

concurrency:
  group: collector-weekly
  cancel-in-progress: true

jobs:
  rank:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # uv via setup-uv, pinned to an immutable commit SHA (supply-chain hardening)
      # with warm dependency cache keyed off apps/stock_collector/uv.lock.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector
      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      - name: Run weekly ranking
        env:
          # Session pooler (5432). Either name works; value = Supavisor session pooler.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: uv run python -m collector.entrypoints.run_weekly

      # Phase N: cold-archive this year's rankings to Parquet + Storage so the
      # retention prune (prune_rankings --verify-archive) has a confirmed copy.
      # Best-effort — the entrypoint always exits 0, so an archive/upload failure
      # never fails the already-succeeded weekly ranking above.
      - name: Archive rankings to Parquet cold-storage
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          COLLECTOR_PARQUET_BUCKET: ${{ vars.COLLECTOR_PARQUET_BUCKET }}
        run: uv run python -m collector.entrypoints.archive_rankings

      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-weekly failed (run ${{ github.run_id }})","body":"The weekly market-cap ranking failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'
