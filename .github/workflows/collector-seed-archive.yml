name: collector-seed-archive

# One-shot MANUAL seed of the Parquet archive with FULL Yahoo history, then upload
# to the PRIVATE Storage bucket. Run once after enabling the archive (the daily
# cron only captures go-forward bars; this backfills the rest). Re-runnable —
# parquet_sink read-merge-rewrite de-dupes by date.
on:
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "Days of history to seed"
        default: "400"
        required: false

concurrency:
  group: collector-seed-archive
  cancel-in-progress: true

jobs:
  seed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector
      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      - name: Seed Parquet archive (full history)
        env:
          # Session pooler (5432) — only to read tracked_symbols; graceful if unset.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: uv run python -m collector.entrypoints.seed_archive --backfill-days "${{ inputs.backfill_days }}"

      - name: Upload Parquet archive to Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          COLLECTOR_PARQUET_BUCKET: ${{ vars.COLLECTOR_PARQUET_BUCKET }}
        run: uv run python -m collector.entrypoints.upload_archive
