name: collector-daily

# DAILY OHLC ingest + snapshot refresh (Phase I).
# Mon-Fri 21:30 UTC (captures the US close directly; Sat is a market holiday and
# dropped; incremental from_date back-fills any missed day on the next run).
on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: collector-daily
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@v4

      # uv via setup-uv, pinned to an immutable commit SHA (supply-chain hardening)
      # with warm dependency cache keyed off apps/stock_collector/uv.lock.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector
      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      - name: Run daily collector
        env:
          # Supabase Supavisor SESSION pooler (IPv4). NOT direct db.<ref> (IPv6-only).
          # Either name works (collector or dashboard_server's); value = session pooler.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          # Phase-1.5 archive: writes local Parquet only when the repo VARIABLE is
          # set to 1/true (unset -> no-op, daily run unchanged). Flip once the
          # PRIVATE bucket exists (I1.5.1b).
          COLLECTOR_ARCHIVE_PARQUET: ${{ vars.COLLECTOR_ARCHIVE_PARQUET }}
        run: uv run python -m collector.entrypoints.run_daily

      # Best-effort: upserts the local Parquet archive to the PRIVATE Storage
      # bucket. Skips when SUPABASE_URL/SERVICE_ROLE are unset; never fails the
      # collection job (continue-on-error + entrypoint returns 0).
      - name: Upload Parquet archive to Storage
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # service-role key: either name works (SUPABASE_SECRET_KEY = server's 2024+ name).
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          COLLECTOR_PARQUET_BUCKET: ${{ vars.COLLECTOR_PARQUET_BUCKET }}
        run: uv run python -m collector.entrypoints.upload_archive

      # Schedule failures are otherwise SILENT — open a tracking issue on failure.
      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-daily failed (run ${{ github.run_id }})","body":"The daily Yahoo OHLC collector failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'
