name: collector-monthly

# MONTHLY SEC 13F institutional-holdings collection (Phase J). 1st of each month
# 07:00 UTC. 13F-HR is filed quarterly (<=45d after quarter-end); monthly is
# idempotent (UPSERT), self-heals a missed month, and catches amendments.
# SEC requires a descriptive User-Agent (SEC_USER_AGENT) or it 403s.
on:
  schedule:
    - cron: "0 7 1 * *"
  workflow_dispatch: {}

concurrency:
  group: collector-monthly
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # uv via setup-uv, pinned to an immutable commit SHA (supply-chain hardening)
      # with warm dependency cache keyed off apps/stock_collector/uv.lock.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector
      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      - name: Run monthly 13F collection
        env:
          # Session pooler (5432). Either name works; value = Supavisor session pooler.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          # SEC fair-access: REQUIRED descriptive UA ("Name email"); missing -> 403.
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          # Raw info-table archive (best-effort, default OFF). Only uploads when
          # COLLECTOR_ARCHIVE_SEC is truthy AND both Supabase vars are present.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          COLLECTOR_ARCHIVE_SEC: ${{ vars.COLLECTOR_ARCHIVE_SEC }}
          COLLECTOR_SEC_BUCKET: ${{ vars.COLLECTOR_SEC_BUCKET }}
        run: uv run python -m collector.entrypoints.run_monthly

      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-monthly failed (run ${{ github.run_id }})","body":"The monthly SEC 13F collection failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'
