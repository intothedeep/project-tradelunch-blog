name: collector-prune

# ANNUAL Parquet archive retention prune (Phase M + L18).
# Dec 30 07:00 UTC — runs once a year after the year's final trading session.
# workflow_dispatch is the manual fallback: the prune is idempotent so a missed
# annual run is fully recoverable by triggering manually.
#
# SAFETY: dry-run by default. The scheduled annual run is ALWAYS dry-run. The
# first REAL prune is a deliberate one-click USER action: trigger via
# workflow_dispatch and UNCHECK "dry_run". Once trusted, lift the scheduled
# gate by editing the run steps below.
#
# Three prune jobs share this workflow (same 12/30 cadence):
#   prune-ohlc      — Phase M: market_history bars (OHLC), archive-gated per label/year
#   prune-13f       — Phase L L18: sec_holdings/sec_filings periods, archive-gated per CIK/year
#   prune-rankings  — Phase N: market_rankings rows, 10yr window, archive-verified
#                     (0 candidates until ~2036; weekly archive_rankings feeds the Parquet copy)
on:
  schedule:
    - cron: "0 7 30 12 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no deletes). UNCHECK for a REAL prune."
        type: boolean
        default: true

concurrency:
  group: collector-prune
  cancel-in-progress: true

jobs:
  prune-ohlc:
    name: Prune OHLC market_history (Phase M)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # uv via setup-uv, pinned to an immutable commit SHA (supply-chain hardening)
      # with warm dependency cache keyed off apps/stock_collector/uv.lock.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector
      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      # Mode B (gate lifted): the scheduled 12/30 run performs a REAL prune.
      # A manual dispatch defaults to dry-run (preview); uncheck dry_run for a
      # manual live prune. The prune still no-ops unless the archive is enabled
      # + Storage reachable AND each label/year Parquet object is verified, so
      # even the scheduled live run can only ever move archive-confirmed cold bars.
      - name: Run OHLC archive retention prune
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          COLLECTOR_MARKET_PARQUET_BUCKET: ${{ vars.COLLECTOR_MARKET_PARQUET_BUCKET }}
          SHOULD_COLLECTOR_MARKET_ARCHIVE_PARQUET: ${{ vars.SHOULD_COLLECTOR_MARKET_ARCHIVE_PARQUET }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            uv run python -m collector.entrypoints.prune_history --dry-run
          else
            echo "::warning::LIVE prune — deletes archive-verified cold bars (scheduled run, or dry_run unchecked)"
            uv run python -m collector.entrypoints.prune_history
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-prune (OHLC) failed (run ${{ github.run_id }})","body":"The annual OHLC archive retention prune failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'

  prune-13f:
    name: Prune 13F sec_holdings/sec_filings (L18)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector
      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      # Archive precondition: a period is hard-deleted ONLY if its Parquet
      # object (sec13f/{cik}/{cik}_{YYYY}.parquet) is confirmed present.
      # Scheduled runs are ALWAYS dry-run (same belt-and-suspenders pattern as OHLC).
      - name: Run 13F archive retention prune
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          COLLECTOR_SEC_PARQUET_BUCKET: ${{ vars.COLLECTOR_SEC_PARQUET_BUCKET }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            echo "::warning::LIVE 13F prune (dry_run unchecked) — will delete archive-verified old periods"
            uv run python -m collector.entrypoints.prune_holdings
          else
            uv run python -m collector.entrypoints.prune_holdings --dry-run
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-prune (13F) failed (run ${{ github.run_id }})","body":"The annual 13F archive retention prune failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'

  prune-rankings:
    name: Prune market_rankings (Phase N — dormant 10yr)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/stock_collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: apps/stock_collector
      - name: Sync deps
        run: |
          uv python install 3.12
          uv sync

      # Forward-looking safeguard: 10-year retention window (ML consult —
      # non-reproducible point-in-time snapshot). The weekly series began
      # recently, so there are ZERO candidates until ~2036. Scheduled runs are
      # ALWAYS dry-run (same belt-and-suspenders as OHLC/13F). --verify-archive is
      # ON (both branches): the weekly archive_rankings step writes
      # rankings/{YYYY}.parquet, and a year is only ever deleted once that object
      # is confirmed present in Storage.
      - name: Run market_rankings retention prune
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          COLLECTOR_MARKET_PARQUET_BUCKET: ${{ vars.COLLECTOR_MARKET_PARQUET_BUCKET }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            echo "::warning::LIVE rankings prune (dry_run unchecked) — deletes archive-verified rows older than 10y"
            uv run python -m collector.entrypoints.prune_rankings --verify-archive
          else
            uv run python -m collector.entrypoints.prune_rankings --dry-run --verify-archive
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d '{"title":"collector-prune (rankings) failed (run ${{ github.run_id }})","body":"The annual market_rankings retention prune failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","labels":["collector","ci-failure"]}'
