name: Supabase Keepalive
# The blog DB lives on a Supabase free-tier project, which auto-pauses after
# ~7 days of no DB activity (dashboard visits / cached API calls do NOT count).
# Blog publishes are sporadic, so ping the DB twice a week to keep it awake.
# The `DATABASE_URL` repo secret holds the blog Supabase pooled connection URI.
on:
  schedule:
    # Mon & Thu at 09:00 UTC — well inside the ~7-day inactivity window.
    - cron: '0 9 * * 1,4'
  workflow_dispatch: {} # allow manual trigger from the Actions tab
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping blog database (SELECT 1)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # require = encrypt without cert verification — matches how the app's
          # pg Pool treats Supabase's self-signed chain (rejectUnauthorized:false).
          PGSSLMODE: require
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not set"
            exit 1
          fi
          psql "$DATABASE_URL" -tAc 'SELECT 1;'
          echo "Blog Supabase keepalive ping OK"
