name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # pnpm version comes from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Client lint gate (ESLint flat config, eslint . --max-warnings 0).
      # The blog_agent ruff lane is intentionally NOT run here: it requires a
      # Python/uv toolchain (pyenv 3.12.3) that this Node-only job does not set
      # up. Run `pnpm --filter blog_agent lint` in a dedicated Python job to
      # enforce that lane in CI.
      - run: pnpm --filter dashboard_client_web lint
      - run: pnpm --filter dashboard_client_web check-types
      - run: pnpm --filter dashboard_server check-types
