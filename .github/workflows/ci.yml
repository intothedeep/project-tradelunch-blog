name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Client lint gate (ESLint flat config, eslint . --max-warnings 0).
      # The blog_agent ruff lane is intentionally NOT run here: it requires a
      # Python/uv toolchain (pyenv 3.12.3) that this Node-only job does not set
      # up. Run `pnpm --filter blog_agent lint` in a dedicated Python job to
      # enforce that lane in CI.
      - run: pnpm --filter dashboard_client_web lint
      - run: pnpm --filter dashboard_client_web check-types
      - run: pnpm --filter dashboard_server check-types
