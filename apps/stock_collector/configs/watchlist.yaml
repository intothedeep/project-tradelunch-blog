# Seed watchlist — Phase I (42 labels, all globally unique).
# category-keyed; each entry: { symbol: <yahoo ticker>, label: <unique display> }
# stocks also carry exchange (US|KRX); Phase 1 stocks are all US.
# FX labels are SOURCE-NATIVE (Yahoo direction, not inverted).
# Editable: add a symbol here to collect it daily. Sticky/ranked symbols
# (Phase 2 tracked_symbols) are merged on top at run time (yaml wins).

fx:
  - { symbol: "EURUSD=X", label: "EUR/USD" }
  - { symbol: "KRW=X", label: "USD/KRW" }
  - { symbol: "JPY=X", label: "USD/JPY" }
  - { symbol: "THB=X", label: "USD/THB" }

